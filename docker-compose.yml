version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_secret_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    ports:
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      EMAIL_DELIVERY_MODE: smtp
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  user-service:
    build: ./user-service
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      migrations:
        condition: service_completed_successfully

  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file: .env
    environment:
      REDIS_HOST: redis
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  postgres_data:
